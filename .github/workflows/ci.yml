name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Go ${{ matrix.go-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25.x", "1.26.x"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify formatting
        shell: bash
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: >-
          go build -trimpath
          -ldflags "-X github.com/gitbagHero/EnvMason/internal/buildinfo.Version=ci
          -X github.com/gitbagHero/EnvMason/internal/buildinfo.Commit=${{ github.sha }}
          -X github.com/gitbagHero/EnvMason/internal/buildinfo.BuildTime=ci"
          ./cmd/envmason
